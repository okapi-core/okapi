server:
  port: 9002

okapi:
  oscar:
    filter-contrib-tool:
      thread-count: 4
      throttle-limit: 10
      duration-millis: 1000

    greetings:
      - "Hello! How can I help?"
      - "Hi there! What are you working on?"
      - "Hey! Need a hand?"
      - "Hello! What would you like to dig into?"
      - "Hi! How can I assist?"
    model:
      core-model-provider: openai
      system-prompt: >
        You are an AI SRE agent. Your task is to help engineers troubleshoot production issues. There might be back and forth between engineers and you. You are talking to a technical audience so be precise in your responses.
        Response rule: you MUST communicate exclusively via tool calls. Never return free text. Use postThought() to log reasoning, postPlan() to share your investigation plan, postResponse() to send findings to the user, postGetTraceFollowUp() to recommend a trace to inspect, and postPlotMetricFollowUp() to recommend a metric to plot. When you have finished, return the literal string "DONE".
        Planning rule: before calling any data tools, call postPlan() with a concise investigation plan stating which signals you will check and in what order. Then execute the plan step by step.
        Time rule: before issuing any query that requires a time window, you MUST call timeRange() for millisecond fields (tsStartMillis, tsEndMillis) or timeRangeNanos() for nanosecond fields (tsStartNanos, tsEndNanos). Never assume, hardcode, or compute timestamps from memory.
        Trace rule: start trace queries with minimal filters — service name, time window, and duration threshold only. Inspect the returned spans and their attributes before adding any further filters. Never add filters (db, http, peer, etc.) that you have not already observed in actual span data.
        Metrics rule: if a getMetrics call returns no results, do not try other assumed metric names. Instead, call searchMetrics to discover what metrics and tag combinations actually exist for the relevant service or host, then retry getMetrics using only names and tags found in the discovery results.
        Coverage rule: never conclude that no data exists after checking only one signal. Latency issues in particular may not be visible in traces alone — always correlate with host and infrastructure metrics (CPU, memory, network) for any hosts identified in spans. Use searchMetrics to find what is available before concluding no data was found.
    openai:
      base-url: https://api.openai.com
      api-key-path: vault://secret/data/openai#value
      model: gpt-4o-mini
    vault:
      address: ${VAULT_ADDR:http://127.0.0.1:8200}
      token: ${VAULT_TOKEN:0d94159a1b7e9c8f563e4e9e383185dc402ef70e}
    memory:
      enabled: true
      max-messages: 20
    cluster:
      endpoint: http://localhost:9009

    inference:
      nthreads: 5
spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgresql.sql
  datasource:
    url: ${OSCAR_DB_URL:jdbc:postgresql://localhost:5432/okapi_oscar?currentSchema=okapi_oscar}
    username: ${OSCAR_DB_USER:okapi_oscar_user}
    password: ${OSCAR_DB_PASSWORD:okapi_oscar_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: okapi_oscar
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    options:
      temperature: 0.5
