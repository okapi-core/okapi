        - id: disk-used
          title: Disk Used
          queries:
            - query: >
                {"metric":"clickhouse.disk.used","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: disk-free
          title: Disk Free
          queries:
            - query: >
                {"metric":"clickhouse.disk.free","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
