version: 1
dashboard:
  id: otel-host-saturation
  title: Host Saturation
  description: Saturation signals for CPU, memory, disk, and filesystem.
  tags: [otel, hostmetrics, monitoring]
  vars:
    - name: host
      type: TAG_VALUE
      tag: host.name
    - name: device
      type: TAG_VALUE
      tag: device
    - name: mountpoint
      type: TAG_VALUE
      tag: mountpoint
  rows:
    - id: saturation-core
      title: Core Saturation Signals
      panels:
        - id: cpu-user-peak
          title: CPU User Utilization (Peak)
          queries:
            - query: >
                {"metric":"system.cpu.utilization","tags":{"host.name":"$__{host}","state":"user"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"MAX"}}
        - id: cpu-system-peak
          title: CPU System Utilization (Peak)
          queries:
            - query: >
                {"metric":"system.cpu.utilization","tags":{"host.name":"$__{host}","state":"system"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"MAX"}}
        - id: memory-utilization-peak
          title: Memory Utilization (Peak)
          queries:
            - query: >
                {"metric":"system.memory.utilization","tags":{"host.name":"$__{host}","state":"used"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"MAX"}}
        - id: disk-io-time-peak
          title: Disk I/O Time (Peak)
          queries:
            - query: >
                {"metric":"system.disk.io_time","tags":{"host.name":"$__{host}","device":"$__{device}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"MAX"}}
        - id: filesystem-utilization-peak
          title: Filesystem Utilization (Peak)
          queries:
            - query: >
                {"metric":"system.filesystem.utilization","tags":{"host.name":"$__{host}","mountpoint":"$__{mountpoint}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"MAX"}}
        - id: network-errors-peak
          title: Network Errors (Peak)
          queries:
            - query: >
                {"metric":"system.network.errors","tags":{"host.name":"$__{host}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"MAX"}}
