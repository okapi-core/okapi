        - id: checkpoints-requested
          title: Checkpoints Requested
          queries:
            - query: >
                {"metric":"postgresql_checkpoints_req","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
    - id: postgres-locks
      title: Locks and Conflicts
      panels:
        - id: deadlocks
          title: Deadlocks
          queries:
            - query: >
                {"metric":"postgresql_deadlocks","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: conflicts
          title: Conflicts
          queries:
            - query: >
                {"metric":"postgresql_conflicts","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
