version: 1
dashboard:
  id: postgres-monitoring
  title: Postgres Monitoring
  description: Postgres connections, transactions, cache, and storage metrics.
  tags: [postgres, monitoring]
  vars:
    - name: service_instance_id
      type: TAG_VALUE
      tag: service_instance_id
  rows:
    - id: postgres-connections
      title: Connections
      panels:
        - id: backends-total
          title: Backends Total
          queries:
            - query: >
                {"metric":"postgresql_backends","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: backends-active
          title: Backends Active
          queries:
            - query: >
                {"metric":"postgresql_backends_active","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: backends-idle
          title: Backends Idle
          queries:
            - query: >
                {"metric":"postgresql_backends_idle","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: max-connections
          title: Max Connections
          queries:
            - query: >
                {"metric":"postgresql_max_connections","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
    - id: postgres-transactions
      title: Transactions
      panels:
        - id: xact-commits
          title: Transactions Committed
          queries:
            - query: >
                {"metric":"postgresql_transactions_committed","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: xact-rollbacks
          title: Transactions Rolled Back
          queries:
            - query: >
                {"metric":"postgresql_transactions_rolled_back","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: xact-total
          title: Transactions Total
          queries:
            - query: >
                {"metric":"postgresql_transactions","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
    - id: postgres-rows
      title: Row Activity
      panels:
        - id: rows-returned
          title: Rows Returned
          queries:
            - query: >
                {"metric":"postgresql_rows_returned","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: rows-fetched
          title: Rows Fetched
          queries:
            - query: >
                {"metric":"postgresql_rows_fetched","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: rows-inserted
          title: Rows Inserted
          queries:
            - query: >
                {"metric":"postgresql_rows_inserted","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: rows-updated
          title: Rows Updated
          queries:
            - query: >
                {"metric":"postgresql_rows_updated","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: rows-deleted
          title: Rows Deleted
          queries:
            - query: >
                {"metric":"postgresql_rows_deleted","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
    - id: postgres-cache
      title: Cache and Blocks
      panels:
