                {"metric":"postgresql_blocks_hit","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: block-read-time
          title: Block Read Time
          queries:
