                {"metric":"postgresql.wal.bytes","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: checkpoints-timed
          title: Checkpoints Timed
          queries:
            - query: >
                {"metric":"postgresql.checkpoints.timed","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: checkpoints-requested
          title: Checkpoints Requested
          queries:
            - query: >
                {"metric":"postgresql.checkpoints.req","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
    - id: postgres-locks
      title: Locks and Conflicts
      panels:
        - id: deadlocks
          title: Deadlocks
          queries:
            - query: >
                {"metric":"postgresql.deadlocks","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: conflicts
          title: Conflicts
          queries:
            - query: >
                {"metric":"postgresql.conflicts","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
