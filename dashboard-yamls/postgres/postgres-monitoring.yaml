    - id: postgres-storage
      title: Storage
      panels:
        - id: db-size
          title: Database Size
          queries:
            - query: >
                {"metric":"postgresql.database.size","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
