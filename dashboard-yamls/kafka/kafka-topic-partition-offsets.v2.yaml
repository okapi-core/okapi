version: 1
dashboard:
  id: otel-kafka-topic-partition-offsets
  title: Kafka Topic & Partition Offsets
  description: Per-topic and per-partition offsets from Kafka broker JMX.
  tags: [otel, kafka, jmx, monitoring]
  vars:
    - name: service_instance_id
      type: TAG_VALUE
      tag: service_instance_id
    - name: topic
      type: TAG_VALUE
      tag: topic
    - name: partition
      type: TAG_VALUE
      tag: partition
  rows:
    - id: kafka-offsets
      title: Offsets
      panels:
        - id: log-end-offset
          title: Log End Offset
          queries:
            - query: >
                {"metric":"kafka.log.end_offset","tags":{"service_instance_id":"$__{service_instance_id}","topic":"$__{topic}","partition":"$__{partition}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: log-start-offset
          title: Log Start Offset
          queries:
            - query: >
                {"metric":"kafka.log.start_offset","tags":{"service_instance_id":"$__{service_instance_id}","topic":"$__{topic}","partition":"$__{partition}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: log-size
          title: Log Size
          queries:
            - query: >
                {"metric":"kafka.log.size","tags":{"service_instance_id":"$__{service_instance_id}","topic":"$__{topic}","partition":"$__{partition}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
