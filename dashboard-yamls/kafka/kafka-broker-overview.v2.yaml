version: 1
dashboard:
  id: otel-kafka-broker-overview
  title: Kafka Broker Overview
  description: Kafka broker request latency, partitions, controller, and log flush metrics.
  tags: [otel, kafka, jmx, monitoring]
  vars:
    - name: service_instance_id
      type: TAG_VALUE
      tag: service_instance_id
  rows:
    - id: kafka-core
      title: Kafka Core
      panels:
        - id: request-time-50p
          title: Request Time 50p
          queries:
            - query: >
                {"metric":"kafka.request.time.50p","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: request-time-99p
          title: Request Time 99p
          queries:
            - query: >
                {"metric":"kafka.request.time.99p","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: request-time-avg
          title: Request Time Avg
          queries:
            - query: >
                {"metric":"kafka.request.time.avg","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: request-queue
          title: Request Queue
          queries:
            - query: >
                {"metric":"kafka.request.queue","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: purgatory-size
          title: Purgatory Size
          queries:
            - query: >
                {"metric":"kafka.purgatory.size","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: partition-count
          title: Partition Count
          queries:
            - query: >
                {"metric":"kafka.partition.count","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: partition-offline
          title: Partition Offline
          queries:
            - query: >
                {"metric":"kafka.partition.offline","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: partition-under-replicated
          title: Partition Under Replicated
          queries:
            - query: >
                {"metric":"kafka.partition.under_replicated","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: max-lag
          title: Max Lag
          queries:
            - query: >
                {"metric":"kafka.max.lag","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: controller-active-count
          title: Controller Active Count
          queries:
            - query: >
                {"metric":"kafka.controller.active.count","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: logs-flush-time-50p
          title: Logs Flush Time 50p
          queries:
            - query: >
                {"metric":"kafka.logs.flush.time.50p","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
        - id: logs-flush-time-99p
          title: Logs Flush Time 99p
          queries:
            - query: >
                {"metric":"kafka.logs.flush.time.99p","tags":{"service_instance_id":"$__{service_instance_id}"},"start":0,"end":0,"metricType":"GAUGE","gaugeQueryConfig":{"resolution":"SECONDLY","aggregation":"AVG"}}
